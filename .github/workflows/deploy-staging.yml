name: CD / Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

# Cancel an in-progress staging deploy when a newer push lands — only the
# latest commit matters. A cancelled migration/deploy is recoverable because
# migrations are idempotent (ADD COLUMN / CREATE TABLE IF NOT EXISTS).
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  deploy:
    needs: [ci]
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/cd.yml
    secrets: inherit
    with:
      environment: staging
      app-url: ${{ vars.STAGING_APP_URL }}
      d1-database: personal-finance-auth-staging
