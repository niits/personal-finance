name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

# Cancel an in-progress staging deploy when a newer push lands — only the
# latest commit matters. A cancelled migration/deploy is recoverable because
# migrations are idempotent (ADD COLUMN / CREATE TABLE IF NOT EXISTS).
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      deployments: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,css}') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Build for Cloudflare
        run: npm run build:cf
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.STAGING_APP_URL }}

      - name: Run D1 migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply personal-finance-auth-staging --remote --env staging

      - name: Deploy to Cloudflare Workers (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
