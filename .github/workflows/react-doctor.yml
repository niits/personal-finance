name: React Doctor

on:
    pull_request:

permissions:
    contents: read

jobs:
    react-doctor:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0 # required for `diff`
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
            - name: Fetch base ref for diff
              env:
                  BASE_REF: ${{ github.base_ref }}
              run: git fetch origin "${BASE_REF}:${BASE_REF}" || true
            - name: Run React Doctor
              env:
                  BASE_REF: ${{ github.base_ref }}
              run: npx -y react-doctor@latest . --fail-on error --offline --diff "$BASE_REF"
