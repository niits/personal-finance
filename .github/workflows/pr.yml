name: PR Checks

on:
  pull_request:
    branches: [staging, main]

# Cancel superseded PR runs — a new push to the PR branch makes the
# in-progress run obsolete, so kill it instead of letting it finish.
concurrency:
  group: pr-${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
