name: CI

# Reusable workflow — called by deploy.yml and deploy-staging.yml.
# Job ordering: test + react-doctor (parallel) → e2e only if both pass.
on:
  workflow_call:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npx vitest run --config vitest.unit.config.ts \
            --reporter=default \
            --reporter=junit \
            --outputFile=test-results/unit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/unit.xml
          retention-days: 30

      - name: Report test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: test-results/unit.xml
          reporter: java-junit

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # On pull_request events the action fetches the base branch itself.
      # On push events (no github.base_ref) we must fetch manually first.
      - name: Fetch base ref for diff (push events only)
        if: github.event_name != 'pull_request'
        run: |
          BASE="${{ github.base_ref || 'main' }}"
          git fetch origin "${BASE}:${BASE}" || true

      - uses: millionco/react-doctor@main
        with:
          diff: ${{ github.base_ref || 'main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: error
          offline: 'true'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test, react-doctor]
    permissions:
      contents: read
      checks: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write .dev.vars for wrangler preview
        run: |
          printf 'GITHUB_CLIENT_ID=ci-placeholder\n' >> .dev.vars
          printf 'GITHUB_CLIENT_SECRET=ci-placeholder\n' >> .dev.vars
          printf 'BETTER_AUTH_SECRET=ci-only-secret-not-used-in-production-aaa\n' >> .dev.vars
          printf 'BETTER_AUTH_URL=http://localhost:8787\n' >> .dev.vars

      - name: Remove test-only API routes before build (same as production)
        run: rm -rf src/app/api/test/

      - name: Apply local D1 migrations
        run: npx wrangler d1 migrations apply personal-finance-auth --local

      - name: Build for Cloudflare
        run: npm run build:cf
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:8787
          APP_VERSION: ${{ github.sha }}

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Report E2E results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests
          path: test-results/e2e.xml
          reporter: java-junit
