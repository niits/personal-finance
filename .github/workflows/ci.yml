name: CI

# Reusable workflow — called by pr.yml, deploy.yml and deploy-staging.yml.
on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run unit tests
        run: npm run test:unit

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      # React Doctor is a PR regression gate: it only blocks on errors *newly
      # introduced* relative to the PR base. On a push event there is no base to
      # diff against (you are the base), so it runs advisory-only and never
      # blocks the deploy — the change was already gated on its PR.
      - name: Fetch base ref for diff
        if: github.base_ref != ''
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch origin "${BASE_REF}:${BASE_REF}" || true

      - name: Run React Doctor
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ -n "$BASE_REF" ]; then
            echo "PR context → gating on new errors vs ${BASE_REF}"
            npx -y react-doctor@latest . --fail-on error --offline --diff "$BASE_REF"
          else
            echo "Push context (no PR base) → React Doctor advisory only, not gating the deploy"
            npx -y react-doctor@latest . --offline || true
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test, react-doctor]
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Write .dev.vars for wrangler preview
        run: |
          printf 'GITHUB_CLIENT_ID=ci-placeholder\n' >> .dev.vars
          printf 'GITHUB_CLIENT_SECRET=ci-placeholder\n' >> .dev.vars
          printf 'BETTER_AUTH_SECRET=ci-only-secret-not-used-in-production-aaa\n' >> .dev.vars
          printf 'BETTER_AUTH_URL=http://localhost:8787\n' >> .dev.vars

      - name: Apply local D1 migrations
        run: npx wrangler d1 migrations apply personal-finance-auth --local

      - uses: ./.github/actions/build-cf
        with:
          app-url: http://localhost:8787

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
