name: CI

on:
  push:
    branches: [main, staging, "migration/v2/firebase"]
  pull_request:

jobs:
  test:
    name: Unit + Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests (Firebase Emulator)
        run: npx firebase-tools emulators:exec --only auth,firestore --project=demo-personal-finance "npm run test:integration:nofire"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  firestore-deploy:
    name: Deploy Firestore rules + indexes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - run: npm ci

      - name: Deploy rules and indexes
        run: npx firebase-tools deploy --only firestore:rules,firestore:indexes
