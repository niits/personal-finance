name: CD / Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress production deploy when a newer push lands — only the
# latest commit matters. A cancelled migration/deploy is recoverable because
# migrations are idempotent (ADD COLUMN / CREATE TABLE IF NOT EXISTS).
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  deploy:
    needs: [ci]
    if: github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/cd.yml
    secrets: inherit
    with:
      environment: production
      app-url: ${{ vars.NEXT_PUBLIC_APP_URL }}
      d1-database: personal-finance-auth
      wrangler-secrets: |
        LANGFUSE_SECRET_KEY
        LANGFUSE_PUBLIC_KEY
        LANGFUSE_BASE_URL
